# Shared base config for all EventStoreDB cluster nodes: image, healthcheck, and restart policy.
x-eventstore-node: &eventstore-node
  image: eventstore/eventstore:23.10.8-bookworm-slim
  healthcheck:
    test: ["CMD-SHELL", "curl -f http://localhost:2113/health/live || exit 1"]
    interval: 5s
    timeout: 5s
    retries: 24
  restart: always

# Common EventStoreDB environment variables shared across all cluster nodes.
# Increase internal TCP heartbeat timeouts to avoid spurious leader elections under Docker/Windows networking latency.
# The defaults (700ms interval, 700ms timeout) are too tight for container-to-container communication on Windows.
x-eventstore-common-env: &eventstore-common-env
  EVENTSTORE_CLUSTER_SIZE: "3"
  EVENTSTORE_RUN_PROJECTIONS: All
  EVENTSTORE_ENABLE_EXTERNAL_TCP: "true"
  EVENTSTORE_ENABLE_ATOM_PUB_OVER_HTTP: "true"
  EVENTSTORE_INSECURE: "true"
  EVENTSTORE_INT_TCP_HEARTBEAT_INTERVAL: "5000"
  EVENTSTORE_INT_TCP_HEARTBEAT_TIMEOUT: "15000"
  EVENTSTORE_DISCOVER_VIA_DNS: "false"
  EVENTSTORE_ADVERTISE_HOST_TO_CLIENT_AS: 127.0.0.1
services:

  # NOTE requires initialization (trust emulator's self-signed cert, create 2 databases)
  #      after `docker compose up equinox-cosmos`, run `bash docker-compose-cosmos.sh`
  equinox-cosmos:
    container_name: equinox-cosmos
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator
    restart: unless-stopped
    environment:
      - AZURE_COSMOS_EMULATOR_PARTITION_COUNT=3
      - AZURE_COSMOS_EMULATOR_IP_ADDRESS_OVERRIDE=127.0.0.1 # will hang when creating tables if omitted
    ports:
      - "8081:8081" # so docker-cosmos-init.sh can get the cert and/or humans can use https://localhost:8081/_explorer/index.html
      - "10250-10255:10250-10255" # tests connect using Direct mode

  equinox-mssql:
    container_name: equinox-mssql
    image: mcr.microsoft.com/mssql/server:2025-latest
    restart: unless-stopped
    ports:
      - 1433:1433
    environment:
      - MSSQL_SA_PASSWORD=mssql1Ipw
      - ACCEPT_EULA=Y
  # see https://github.com/microsoft/mssql-docker/issues/2#issuecomment-1683956282
  equinox-mssql-init:
    image: mcr.microsoft.com/mssql-tools
    network_mode: service:equinox-mssql
    command: bash -c 'until /opt/mssql-tools/bin/sqlcmd -U sa -P mssql1Ipw -Q "CREATE DATABASE EQUINOX_TEST_DB"; do echo retry && sleep 1; done'
    depends_on:
      - equinox-mssql

  equinox-mysql:
    container_name: equinox-mysql
    image: mysql:5.6
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ALLOW_EMPTY_PASSWORD=1
      - MYSQL_DATABASE=EQUINOX_TEST_DB
# it _almost_ (but doesn't) works with the default mysql using the following
#    command: ['mysqld', '--character-set-server=utf8mb4', '--collation-server=utf8mb4_unicode_ci']

  # 3-node EventStoreDB 23.10 LTS cluster running in INSECURE mode (no TLS) for local integration testing.
  # IMPORTANT: INSECURE mode is suitable for local development/testing ONLY. Do NOT use in staging or production.
  # 23.10 is the last LTS version supporting both the gRPC and legacy TCP protocols.
  # Nodes expose gRPC on ports 2111-2113 and TCP on ports 1111-1113 to the host.
  node1.eventstore:
    <<: *eventstore-node
    container_name: node1.eventstore
    environment:
      <<: *eventstore-common-env
      EVENTSTORE_INT_IP: 172.30.240.11
      EVENTSTORE_ADVERTISE_HTTP_PORT_TO_CLIENT_AS: "2111"
      EVENTSTORE_ADVERTISE_TCP_PORT_TO_CLIENT_AS: "1111"
      EVENTSTORE_GOSSIP_SEED: 172.30.240.12:2113,172.30.240.13:2113
    ports:
      - 1111:1113
      - 2111:2113
    networks:
      clusternetwork:
        ipv4_address: 172.30.240.11

  node2.eventstore:
    <<: *eventstore-node
    container_name: node2.eventstore
    environment:
      <<: *eventstore-common-env
      EVENTSTORE_INT_IP: 172.30.240.12
      EVENTSTORE_ADVERTISE_HTTP_PORT_TO_CLIENT_AS: "2112"
      EVENTSTORE_ADVERTISE_TCP_PORT_TO_CLIENT_AS: "1112"
      EVENTSTORE_GOSSIP_SEED: 172.30.240.11:2113,172.30.240.13:2113
    ports:
      - 1112:1113
      - 2112:2113
    networks:
      clusternetwork:
        ipv4_address: 172.30.240.12

  node3.eventstore:
    <<: *eventstore-node
    container_name: node3.eventstore
    environment:
      <<: *eventstore-common-env
      EVENTSTORE_INT_IP: 172.30.240.13
      EVENTSTORE_ADVERTISE_HTTP_PORT_TO_CLIENT_AS: "2113"
      EVENTSTORE_ADVERTISE_TCP_PORT_TO_CLIENT_AS: "1113"
      EVENTSTORE_GOSSIP_SEED: 172.30.240.11:2113,172.30.240.12:2113
    ports:
      - 1113:1113
      - 2113:2113
    networks:
      clusternetwork:
        ipv4_address: 172.30.240.13

  dynamodb-local:
    image: amazon/dynamodb-local
    container_name: dynamodb-local
    hostname: dynamodb-local
    restart: always
    volumes:
      - ./docker-dynamodblocal-data:/home/dynamodblocal/data
    ports:
      - 8000:8000
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath /home/dynamodblocal/data/"
    
  dynamodb-admin:
    image: aaronshaf/dynamodb-admin
    ports:
      - "8001:8001"
    environment:
      DYNAMO_ENDPOINT: "http://dynamodb-local:8000"
      AWS_REGION: "us-west-2"
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
    depends_on:
      - dynamodb-local
  equinox-messagedb:
    image: ethangarofolo/message-db
    ports:
      - "5432:5432"

networks:
  clusternetwork:
    name: eventstoredb.local
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.30.240.0/24
